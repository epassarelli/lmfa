<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Mantenimiento - Mi Folklore Argentino</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b4513;
            --accent: #d2691e;
            --bg: #0f172a;
            --text: #f1f5f9;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #1e293b, var(--bg));
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            text-align: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            z-index: 10;
            padding: 2rem;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fbbf24, #d2691e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(210, 105, 30, 0.2);
            color: #fbbf24;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(210, 105, 30, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 1rem 0;
            line-height: 1.2;
        }

        p {
            font-size: 1.125rem;
            color: #94a3b8;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #fbbf24;
            border-radius: 50%;
            margin: 0 auto 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .decorative-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(100px);
            opacity: 0.1;
            border-radius: 50%;
            z-index: 1;
        }

        .circle-1 { top: -100px; right: -100px; }
        .circle-2 { bottom: -100px; left: -100px; }
    </style>
</head>
<body>
    <div class="decorative-circle circle-1"></div>
    <div class="decorative-circle circle-2"></div>

    <div class="container">
        <div class="logo">Mi Folklore Argentino</div>
        <div class="badge">Evolucionando para vos</div>
        
        <div class="spinner"></div>
        
        <h1>En Mantenimiento</h1>
        <p>
            Estamos realizando un upgrade importante en nuestra plataforma para brindarte una mejor experiencia con nuevas secciones de Clasificados y Newsletters.
        </p>
        
        <p style="font-size: 0.875rem; font-style: italic; opacity: 0.7;">
            Volveremos en unos minutos. ¡Gracias por tu paciencia!
        </p>
    </div>
</body>
</html>
